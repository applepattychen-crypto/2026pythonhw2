<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>學分救援站｜大學生學分危機警報系統</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f4f6fb;
      color: #222;
    }

    header {
      background: linear-gradient(135deg, #2b5876, #4e4376);
      color: white;
      padding: 28px 40px;
    }

    header h1 {
      margin: 0;
      font-size: 32px;
    }

    header p {
      margin: 10px 0 0;
      opacity: 0.9;
    }

    .container {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 20px;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .stat {
      font-size: 28px;
      font-weight: bold;
      margin-top: 8px;
    }

    .danger { color: #e53935; }
    .warning { color: #fb8c00; }
    .safe { color: #43a047; }
    .info { color: #1e88e5; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    h2 {
      margin-top: 0;
      font-size: 22px;
      border-left: 6px solid #4e4376;
      padding-left: 10px;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
      font-size: 14px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
    }

    button {
      margin-top: 8px;
      border: none;
      background: #4e4376;
      color: white;
      padding: 9px 13px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin-right: 6px;
    }

    button:hover {
      background: #362d5b;
    }

    .secondary {
      background: #607d8b;
    }

    .secondary:hover {
      background: #455a64;
    }

    .danger-btn {
      background: #e53935;
    }

    .danger-btn:hover {
      background: #c62828;
    }

    .mini-btn {
      padding: 6px 9px;
      font-size: 12px;
      margin-top: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 14px;
      font-size: 14px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: #f0f1f8;
    }

    .tag {
      padding: 4px 8px;
      border-radius: 20px;
      color: white;
      font-size: 12px;
      display: inline-block;
      white-space: nowrap;
    }

    .tag-safe { background: #43a047; }
    .tag-warning { background: #fb8c00; }
    .tag-danger { background: #e53935; }
    .tag-info { background: #1e88e5; }
    .tag-gray { background: #757575; }

    .full {
      grid-column: 1 / -1;
    }

    .empty {
      color: #777;
      margin-top: 12px;
    }

    .progress {
      width: 100%;
      background: #eee;
      border-radius: 10px;
      overflow: hidden;
      height: 12px;
      margin-top: 6px;
    }

    .bar {
      height: 100%;
      background: #4e4376;
      width: 0%;
    }

    .small {
      font-size: 13px;
      color: #666;
      line-height: 1.6;
    }

    .notice {
      background: #fff8e1;
      border-left: 5px solid #ffb300;
      padding: 12px;
      border-radius: 8px;
      margin-top: 10px;
      line-height: 1.6;
    }

    .edit-box {
      background: #f7f7fb;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 14px;
      margin-top: 14px;
    }

    .row-actions {
      white-space: nowrap;
    }

    @media (max-width: 900px) {
      .dashboard, .grid {
        grid-template-columns: 1fr;
      }

      header {
        padding: 24px 20px;
      }

      table {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>學分救援站</h1>
    <p>大學生課業期限管理與成績危機預警系統</p>
  </header>

  <div class="container">
    <div class="dashboard">
      <div class="card">
        <div>課程數量</div>
        <div class="stat info" id="courseCount">0</div>
      </div>
      <div class="card">
        <div>未完成任務</div>
        <div class="stat warning" id="unfinishedCount">0</div>
      </div>
      <div class="card">
        <div>今日／逾期警報</div>
        <div class="stat danger" id="urgentCount">0</div>
      </div>
      <div class="card">
        <div>危險科目</div>
        <div class="stat danger" id="dangerCourseCount">0</div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2 id="courseFormTitle">新增課程</h2>
        <input type="hidden" id="editingCourseId">

        <label>課程名稱</label>
        <input type="text" id="courseName" placeholder="例如：電腦應用">

        <label>老師</label>
        <input type="text" id="teacherName" placeholder="例如：王老師">

        <label>學分數</label>
        <input type="number" id="courseCredit" min="0" step="1" placeholder="例如：3">

        <label>目標分數</label>
        <input type="number" id="courseTarget" min="0" max="100" step="1" value="60" placeholder="例如：60">

        <button onclick="saveCourse()">儲存課程</button>
        <button class="secondary" onclick="resetCourseForm()">取消編輯</button>


        <button class="secondary" onclick="clearAllData()">清空本機資料</button>
      </div>

      <div class="card">
        <h2 id="taskFormTitle">新增作業／考試</h2>
        <input type="hidden" id="editingTaskId">

        <label>選擇課程</label>
        <select id="taskCourse"></select>

        <label>類型</label>
        <select id="taskType">
          <option>作業</option>
          <option>小考</option>
          <option>期中考</option>
          <option>期末考</option>
          <option>報告</option>
          <option>其他</option>
        </select>

        <label>事項名稱</label>
        <input type="text" id="taskName" placeholder="例如：Excel 小考">

        <label>截止／考試日期</label>
        <input type="date" id="taskDate">

        <button onclick="saveTask()">儲存事項</button>
        <button class="secondary" onclick="resetTaskForm()">取消編輯</button>
      </div>

      <div class="card full">
        <h2 id="gradeFormTitle">新增成績項目</h2>
        <input type="hidden" id="editingGradeId">

        <div class="grid">
          <div>
            <label>選擇課程</label>
            <select id="gradeCourse" onchange="renderGradeTaskOptions()"></select>
          </div>

          <div>
            <label>成績項目類型</label>
            <select id="gradeType" onchange="renderGradeTaskOptions()">
              <option>作業</option>
              <option>小考</option>
              <option>期中考</option>
              <option>期末考</option>
              <option>報告</option>
              <option>其他</option>
            </select>
          </div>
        </div>

        <label>從已建立的作業／考試選擇</label>
        <select id="gradeTask"></select>

        <div class="grid">
          <div>
            <label>比例（%）</label>
            <input type="number" id="gradeWeight" min="0" max="100" placeholder="例如：30">
          </div>
          <div>
            <label>分數</label>
            <input type="number" id="gradeScore" min="0" max="100" placeholder="例如：75，未考可先留空">
          </div>
        </div>

        <button onclick="saveGrade()">儲存成績</button>
        <button class="secondary" onclick="resetGradeForm()">取消編輯</button>
        <p class="small">各科總成績比例預設以 100% 為基準。若某科輸入比例超過 100%，系統會提醒你檢查。</p>
      </div>

      <div class="card full">
        <h2>即將到期與危機警報</h2>
        <div id="alertList"></div>
      </div>

      <div class="card full">
        <h2>課程列表與成績預估</h2>
        <div id="courseTable"></div>
      </div>

      <div class="card full">
        <h2>作業與考試列表</h2>
        <div id="taskTable"></div>
      </div>
    </div>
  </div>

<script>
let courses = JSON.parse(localStorage.getItem("courses_v2")) || [];
let tasks = JSON.parse(localStorage.getItem("tasks_v2")) || [];
let grades = JSON.parse(localStorage.getItem("grades_v2")) || [];

const taskTypes = ["作業", "小考", "期中考", "期末考", "報告", "其他"];

function saveData() {
  localStorage.setItem("courses_v2", JSON.stringify(courses));
  localStorage.setItem("tasks_v2", JSON.stringify(tasks));
  localStorage.setItem("grades_v2", JSON.stringify(grades));
}

function saveCourse() {
  const editId = Number(document.getElementById("editingCourseId").value);
  const name = document.getElementById("courseName").value.trim();
  const teacher = document.getElementById("teacherName").value.trim();
  const credit = Number(document.getElementById("courseCredit").value);
  const target = Number(document.getElementById("courseTarget").value);

  if (!name) {
    alert("請輸入課程名稱");
    return;
  }

  if (target < 0 || target > 100 || isNaN(target)) {
    alert("目標分數請輸入 0 到 100 之間");
    return;
  }

  if (editId) {
    const course = courses.find(c => c.id === editId);
    if (course) {
      course.name = name;
      course.teacher = teacher || "未填寫";
      course.credit = credit || 0;
      course.target = target;
    }
  } else {
    courses.push({
      id: Date.now(),
      name,
      teacher: teacher || "未填寫",
      credit: credit || 0,
      target
    });
  }

  resetCourseForm();
  saveData();
  render();
}

function editCourse(id) {
  const course = courses.find(c => c.id === id);
  if (!course) return;

  document.getElementById("courseFormTitle").innerText = "編輯課程";
  document.getElementById("editingCourseId").value = course.id;
  document.getElementById("courseName").value = course.name;
  document.getElementById("teacherName").value = course.teacher;
  document.getElementById("courseCredit").value = course.credit;
  document.getElementById("courseTarget").value = course.target ?? 60;
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function resetCourseForm() {
  document.getElementById("courseFormTitle").innerText = "新增課程";
  document.getElementById("editingCourseId").value = "";
  document.getElementById("courseName").value = "";
  document.getElementById("teacherName").value = "";
  document.getElementById("courseCredit").value = "";
  document.getElementById("courseTarget").value = "60";
}

function saveTask() {
  const editId = Number(document.getElementById("editingTaskId").value);
  const courseId = Number(document.getElementById("taskCourse").value);
  const type = document.getElementById("taskType").value;
  const name = document.getElementById("taskName").value.trim();
  const date = document.getElementById("taskDate").value;

  if (!courseId || !name || !date) {
    alert("請完整輸入事項資料");
    return;
  }

  if (editId) {
    const task = tasks.find(t => t.id === editId);
    if (task) {
      task.courseId = courseId;
      task.type = type;
      task.name = name;
      task.date = date;
    }

    const linkedGrade = grades.find(g => g.taskId === editId);
    if (linkedGrade) {
      linkedGrade.courseId = courseId;
      linkedGrade.type = type;
    }
  } else {
    tasks.push({
      id: Date.now(),
      courseId,
      type,
      name,
      date,
      done: false
    });
  }

  resetTaskForm();
  saveData();
  render();
}

function editTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;

  document.getElementById("taskFormTitle").innerText = "編輯作業／考試";
  document.getElementById("editingTaskId").value = task.id;
  document.getElementById("taskCourse").value = task.courseId;
  document.getElementById("taskType").value = task.type;
  document.getElementById("taskName").value = task.name;
  document.getElementById("taskDate").value = task.date;
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function resetTaskForm() {
  document.getElementById("taskFormTitle").innerText = "新增作業／考試";
  document.getElementById("editingTaskId").value = "";
  document.getElementById("taskType").value = "作業";
  document.getElementById("taskName").value = "";
  document.getElementById("taskDate").value = "";
}

function saveGrade() {
  const editId = Number(document.getElementById("editingGradeId").value);
  const courseId = Number(document.getElementById("gradeCourse").value);
  const type = document.getElementById("gradeType").value;
  const taskId = Number(document.getElementById("gradeTask").value);
  const weight = Number(document.getElementById("gradeWeight").value);
  const scoreInput = document.getElementById("gradeScore").value;
  const score = scoreInput === "" ? "" : Number(scoreInput);

  if (!courseId || !taskId || !type || isNaN(weight) || weight <= 0) {
    alert("請選擇課程、成績項目，並輸入比例");
    return;
  }

  if (weight < 0 || weight > 100) {
    alert("單一項目比例請輸入 0 到 100 之間");
    return;
  }

  if (score !== "" && (score < 0 || score > 100)) {
    alert("分數請輸入 0 到 100 之間");
    return;
  }

  const otherWeights = grades
    .filter(g => g.courseId === courseId && g.id !== editId)
    .reduce((sum, g) => sum + Number(g.weight), 0);

  if (otherWeights + weight > 100) {
    const ok = confirm(`這科目前總比例會變成 ${otherWeights + weight}%，已經超過 100%。確定要儲存嗎？`);
    if (!ok) return;
  }

  const repeated = grades.find(g => g.taskId === taskId && g.id !== editId);
  if (repeated) {
    alert("這個作業／考試已經建立過成績項目，請直接編輯原本的成績。");
    return;
  }

  if (editId) {
    const grade = grades.find(g => g.id === editId);
    if (grade) {
      grade.courseId = courseId;
      grade.type = type;
      grade.taskId = taskId;
      grade.weight = weight;
      grade.score = score;
    }
  } else {
    grades.push({
      id: Date.now(),
      courseId,
      type,
      taskId,
      weight,
      score
    });
  }

  resetGradeForm();
  saveData();
  render();
}

function editGrade(id) {
  const grade = grades.find(g => g.id === id);
  if (!grade) return;

  document.getElementById("gradeFormTitle").innerText = "編輯成績項目";
  document.getElementById("editingGradeId").value = grade.id;
  document.getElementById("gradeCourse").value = grade.courseId;
  document.getElementById("gradeType").value = grade.type;
  renderGradeTaskOptions();
  document.getElementById("gradeTask").value = grade.taskId;
  document.getElementById("gradeWeight").value = grade.weight;
  document.getElementById("gradeScore").value = grade.score;
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function resetGradeForm() {
  document.getElementById("gradeFormTitle").innerText = "新增成績項目";
  document.getElementById("editingGradeId").value = "";
  document.getElementById("gradeType").value = "作業";
  document.getElementById("gradeWeight").value = "";
  document.getElementById("gradeScore").value = "";
  renderGradeTaskOptions();
}

function deleteCourse(id) {
  if (!confirm("刪除課程會一起刪掉相關作業與成績，確定嗎？")) return;

  courses = courses.filter(c => c.id !== id);
  tasks = tasks.filter(t => t.courseId !== id);
  grades = grades.filter(g => g.courseId !== id);

  saveData();
  render();
}

function deleteTask(id) {
  const hasGrade = grades.some(g => g.taskId === id);
  const msg = hasGrade
    ? "這個事項已經有成績資料，刪除後該成績也會一起刪除，確定嗎？"
    : "確定要刪除這個事項嗎？";
  if (!confirm(msg)) return;

  tasks = tasks.filter(t => t.id !== id);
  grades = grades.filter(g => g.taskId !== id);
  saveData();
  render();
}

function deleteGrade(id) {
  if (!confirm("確定要刪除這個成績項目嗎？")) return;
  grades = grades.filter(g => g.id !== id);
  saveData();
  render();
}

function toggleTask(id) {
  const task = tasks.find(t => t.id === id);
  if (task) task.done = !task.done;
  saveData();
  render();
}

function getCourseName(id) {
  const course = courses.find(c => c.id === id);
  return course ? course.name : "未知課程";
}

function getCourseTarget(id) {
  const course = courses.find(c => c.id === id);
  return course ? Number(course.target ?? 60) : 60;
}

function getTaskName(id) {
  const task = tasks.find(t => t.id === id);
  return task ? task.name : "已刪除事項";
}

function daysLeft(dateString) {
  const today = new Date();
  today.setHours(0,0,0,0);
  const target = new Date(dateString);
  target.setHours(0,0,0,0);
  return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
}

function taskStatus(task) {
  if (task.done) {
    return { text: "已完成", className: "tag-safe", level: 0 };
  }

  const d = daysLeft(task.date);

  if (d < 0) return { text: `已逾期 ${Math.abs(d)} 天`, className: "tag-danger", level: 4 };
  if (d === 0) return { text: "今天截止", className: "tag-danger", level: 4 };
  if (d <= 2) return { text: `剩 ${d} 天`, className: "tag-danger", level: 3 };
  if (d <= 7) return { text: `剩 ${d} 天`, className: "tag-warning", level: 2 };
  return { text: `剩 ${d} 天`, className: "tag-info", level: 1 };
}

function gradeSummary(courseId) {
  const list = grades.filter(g => g.courseId === courseId);
  const target = getCourseTarget(courseId);

  let earned = 0;
  let completedWeight = 0;
  let totalWeight = 0;

  list.forEach(g => {
    totalWeight += Number(g.weight);
    if (g.score !== "" && !isNaN(Number(g.score))) {
      earned += Number(g.score) * Number(g.weight) / 100;
      completedWeight += Number(g.weight);
    }
  });

  const remainingWeight = Math.max(0, 100 - completedWeight);
  const enteredWeightRemaining = Math.max(0, 100 - totalWeight);

  let projected = earned;
  const scoredGrades = list.filter(g => g.score !== "" && !isNaN(Number(g.score)));
  if (completedWeight > 0 && remainingWeight > 0) {
    const currentAverage = earned / (completedWeight / 100);
    projected = earned + currentAverage * (remainingWeight / 100);
  }

  let statusText = "尚未輸入";
  let statusClass = "tag-gray";
  let danger = false;

  if (list.length > 0) {
    if (totalWeight > 100) {
      statusText = "比例超過100%";
      statusClass = "tag-danger";
      danger = true;
    } else if (completedWeight === 0) {
      statusText = "待輸入成績";
      statusClass = "tag-info";
    } else if (earned >= target) {
      statusText = "已達目標";
      statusClass = "tag-safe";
    } else if (projected >= target + 10) {
      statusText = "安全";
      statusClass = "tag-safe";
    } else if (projected >= target) {
      statusText = "注意";
      statusClass = "tag-warning";
    } else {
      statusText = "學分危機";
      statusClass = "tag-danger";
      danger = true;
    }
  }

  return {
    earned: earned.toFixed(1),
    projected: projected.toFixed(1),
    completedWeight,
    totalWeight,
    enteredWeightRemaining,
    target,
    statusText,
    statusClass,
    danger,
    items: list
  };
}

function renderSelects() {
  const taskCourse = document.getElementById("taskCourse");
  const gradeCourse = document.getElementById("gradeCourse");

  const currentTaskCourse = taskCourse.value;
  const currentGradeCourse = gradeCourse.value;

  taskCourse.innerHTML = "";
  gradeCourse.innerHTML = "";

  if (courses.length === 0) {
    taskCourse.innerHTML = `<option value="">請先新增課程</option>`;
    gradeCourse.innerHTML = `<option value="">請先新增課程</option>`;
    renderGradeTaskOptions();
    return;
  }

  courses.forEach(c => {
    taskCourse.innerHTML += `<option value="${c.id}">${c.name}</option>`;
    gradeCourse.innerHTML += `<option value="${c.id}">${c.name}</option>`;
  });

  if (currentTaskCourse) taskCourse.value = currentTaskCourse;
  if (currentGradeCourse) gradeCourse.value = currentGradeCourse;

  renderGradeTaskOptions();
}

function renderGradeTaskOptions() {
  const gradeCourse = document.getElementById("gradeCourse");
  const gradeType = document.getElementById("gradeType");
  const gradeTask = document.getElementById("gradeTask");

  if (!gradeCourse || !gradeType || !gradeTask) return;

  const courseId = Number(gradeCourse.value);
  const type = gradeType.value;
  const editingGradeId = Number(document.getElementById("editingGradeId").value);

  gradeTask.innerHTML = "";

  const usedTaskIds = grades
    .filter(g => g.id !== editingGradeId)
    .map(g => Number(g.taskId));

  const available = tasks.filter(t =>
    t.courseId === courseId &&
    t.type === type &&
    !usedTaskIds.includes(Number(t.id))
  );

  if (available.length === 0) {
    gradeTask.innerHTML = `<option value="">沒有可選項目，請先新增對應的作業或考試</option>`;
    return;
  }

  available.forEach(t => {
    gradeTask.innerHTML += `<option value="${t.id}">${t.name}｜${t.date}</option>`;
  });
}

function renderDashboard() {
  document.getElementById("courseCount").innerText = courses.length;
  document.getElementById("unfinishedCount").innerText = tasks.filter(t => !t.done).length;

  const urgent = tasks.filter(t => {
    const s = taskStatus(t);
    return !t.done && s.level >= 4;
  }).length;
  document.getElementById("urgentCount").innerText = urgent;

  const dangerCourses = courses.filter(c => gradeSummary(c.id).danger).length;
  document.getElementById("dangerCourseCount").innerText = dangerCourses;
}

function renderAlerts() {
  const alertList = document.getElementById("alertList");

  const sorted = [...tasks]
    .filter(t => !t.done)
    .sort((a, b) => daysLeft(a.date) - daysLeft(b.date));

  if (sorted.length === 0) {
    alertList.innerHTML = `<p class="empty">目前沒有未完成事項。</p>`;
    return;
  }

  let html = `<table>
    <tr>
      <th>狀態</th>
      <th>課程</th>
      <th>類型</th>
      <th>事項</th>
      <th>日期</th>
    </tr>`;

  sorted.slice(0, 8).forEach(t => {
    const s = taskStatus(t);
    html += `
      <tr>
        <td><span class="tag ${s.className}">${s.text}</span></td>
        <td>${getCourseName(t.courseId)}</td>
        <td>${t.type}</td>
        <td>${t.name}</td>
        <td>${t.date}</td>
      </tr>`;
  });

  html += `</table>`;
  alertList.innerHTML = html;
}

function renderCourses() {
  const courseTable = document.getElementById("courseTable");

  if (courses.length === 0) {
    courseTable.innerHTML = `<p class="empty">尚未新增課程。</p>`;
    return;
  }

  let html = `<table>
    <tr>
      <th>課程</th>
      <th>老師</th>
      <th>學分</th>
      <th>目標</th>
      <th>目前已拿分數</th>
      <th>預估總成績</th>
      <th>總比例</th>
      <th>狀態</th>
      <th>操作</th>
    </tr>`;

  courses.forEach(c => {
    const g = gradeSummary(c.id);
    const progress = Math.min(100, g.totalWeight);
    const weightClass = g.totalWeight > 100 ? "tag-danger" : (g.totalWeight === 100 ? "tag-safe" : "tag-warning");

    html += `
      <tr>
        <td><strong>${c.name}</strong></td>
        <td>${c.teacher}</td>
        <td>${c.credit}</td>
        <td>${g.target}</td>
        <td>${g.earned}</td>
        <td>${g.projected}</td>
        <td>
          <span class="tag ${weightClass}">${g.totalWeight}% / 100%</span>
          <div class="progress"><div class="bar" style="width:${progress}%"></div></div>
        </td>
        <td><span class="tag ${g.statusClass}">${g.statusText}</span></td>
        <td class="row-actions">
          <button class="mini-btn" onclick="editCourse(${c.id})">編輯</button>
          <button class="mini-btn danger-btn" onclick="deleteCourse(${c.id})">刪除</button>
        </td>
      </tr>`;

    if (g.items.length > 0) {
      html += `
        <tr>
          <td colspan="9">
            <strong>${c.name} 成績項目：</strong>
            ${g.items.map(item => `
              <span class="tag tag-gray">
                ${item.type}｜${getTaskName(item.taskId)}｜${item.weight}%｜${item.score === "" ? "未輸入" : item.score + "分"}
              </span>
              <button class="mini-btn" onclick="editGrade(${item.id})">編輯</button>
              <button class="mini-btn danger-btn" onclick="deleteGrade(${item.id})">刪除</button>
            `).join(" ")}
          </td>
        </tr>`;
    }
  });

  html += `</table>`;
  courseTable.innerHTML = html;
}

function renderTasks() {
  const taskTable = document.getElementById("taskTable");

  if (tasks.length === 0) {
    taskTable.innerHTML = `<p class="empty">尚未新增作業或考試。</p>`;
    return;
  }

  let html = `<table>
    <tr>
      <th>狀態</th>
      <th>課程</th>
      <th>類型</th>
      <th>事項</th>
      <th>日期</th>
      <th>完成</th>
      <th>操作</th>
    </tr>`;

  [...tasks].sort((a, b) => new Date(a.date) - new Date(b.date)).forEach(t => {
    const s = taskStatus(t);
    const hasGrade = grades.some(g => g.taskId === t.id);

    html += `
      <tr>
        <td><span class="tag ${s.className}">${s.text}</span></td>
        <td>${getCourseName(t.courseId)}</td>
        <td>${t.type}</td>
        <td>${t.name} ${hasGrade ? '<span class="tag tag-info">已加入成績</span>' : ''}</td>
        <td>${t.date}</td>
        <td><button class="mini-btn" onclick="toggleTask(${t.id})">${t.done ? "改未完成" : "標記完成"}</button></td>
        <td class="row-actions">
          <button class="mini-btn" onclick="editTask(${t.id})">編輯</button>
          <button class="mini-btn danger-btn" onclick="deleteTask(${t.id})">刪除</button>
        </td>
      </tr>`;
  });

  html += `</table>`;
  taskTable.innerHTML = html;
}

function clearAllData() {
  if (!confirm("確定要清空這個瀏覽器裡的所有課程、作業與成績資料嗎？")) return;
  courses = [];
  tasks = [];
  grades = [];
  saveData();
  render();
}

function render() {
  renderSelects();
  renderDashboard();
  renderAlerts();
  renderCourses();
  renderTasks();
}

render();
</script>
</body>
</html>
