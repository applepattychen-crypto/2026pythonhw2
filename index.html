<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>學分救援站</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f4f6fb;
      color: #222;
    }

    header {
      background: linear-gradient(135deg, #2b5876, #4e4376);
      color: white;
      padding: 28px 40px;
    }

    header h1 {
      margin: 0;
      font-size: 32px;
    }

    header p {
      margin: 10px 0 0;
      opacity: 0.9;
    }

    .container {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 20px;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .stat {
      font-size: 28px;
      font-weight: bold;
      margin-top: 8px;
    }

    .danger { color: #e53935; }
    .warning { color: #fb8c00; }
    .safe { color: #43a047; }
    .info { color: #1e88e5; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    h2 {
      margin-top: 0;
      font-size: 22px;
      border-left: 6px solid #4e4376;
      padding-left: 10px;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
      font-size: 14px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
    }

    button {
      margin-top: 14px;
      border: none;
      background: #4e4376;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #362d5b;
    }

    .secondary {
      background: #607d8b;
    }

    .danger-btn {
      background: #e53935;
    }

    .danger-btn:hover {
      background: #c62828;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 14px;
      font-size: 14px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: #f0f1f8;
    }

    .tag {
      padding: 4px 8px;
      border-radius: 20px;
      color: white;
      font-size: 12px;
      display: inline-block;
      white-space: nowrap;
    }

    .tag-safe { background: #43a047; }
    .tag-warning { background: #fb8c00; }
    .tag-danger { background: #e53935; }
    .tag-info { background: #1e88e5; }
    .tag-gray { background: #757575; }

    .full {
      grid-column: 1 / -1;
    }

    .empty {
      color: #777;
      margin-top: 12px;
    }

    .progress {
      width: 100%;
      background: #eee;
      border-radius: 10px;
      overflow: hidden;
      height: 12px;
      margin-top: 6px;
    }

    .bar {
      height: 100%;
      background: #4e4376;
      width: 0%;
    }

    .small {
      font-size: 13px;
      color: #666;
    }

    .notice {
      background: #fff8e1;
      border-left: 5px solid #ffb300;
      padding: 12px;
      border-radius: 8px;
      margin-top: 10px;
      line-height: 1.6;
    }

    @media (max-width: 900px) {
      .dashboard, .grid {
        grid-template-columns: 1fr;
      }

      header {
        padding: 24px 20px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>學分救援站</h1>
    <p>大學生課業期限管理與成績危機預警系統</p>
  </header>

  <div class="container">
    <div class="dashboard">
      <div class="card">
        <div>課程數量</div>
        <div class="stat info" id="courseCount">0</div>
      </div>
      <div class="card">
        <div>未完成任務</div>
        <div class="stat warning" id="unfinishedCount">0</div>
      </div>
      <div class="card">
        <div>今日／逾期警報</div>
        <div class="stat danger" id="urgentCount">0</div>
      </div>
      <div class="card">
        <div>危險科目</div>
        <div class="stat danger" id="dangerCourseCount">0</div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>新增課程</h2>
        <label>課程名稱</label>
        <input type="text" id="courseName" placeholder="例如：電腦應用">

        <label>老師</label>
        <input type="text" id="teacherName" placeholder="例如：王老師">

        <label>學分數</label>
        <input type="number" id="courseCredit" min="0" step="1" placeholder="例如：3">

        <button onclick="addCourse()">新增課程</button>

        <div class="notice">
          使用方式：先新增課程，再去新增作業、考試或成績項目。
        </div>
      </div>

      <div class="card">
        <h2>新增作業／考試</h2>
        <label>選擇課程</label>
        <select id="taskCourse"></select>

        <label>類型</label>
        <select id="taskType">
          <option>作業</option>
          <option>小考</option>
          <option>期中考</option>
          <option>期末考</option>
          <option>報告</option>
          <option>其他</option>
        </select>

        <label>事項名稱</label>
        <input type="text" id="taskName" placeholder="例如：Excel 小考">

        <label>截止／考試日期</label>
        <input type="date" id="taskDate">

        <button onclick="addTask()">新增事項</button>
      </div>

      <div class="card">
        <h2>新增成績項目</h2>
        <label>選擇課程</label>
        <select id="gradeCourse"></select>

        <label>成績項目</label>
        <input type="text" id="gradeItem" placeholder="例如：期中考">

        <label>比例（%）</label>
        <input type="number" id="gradeWeight" min="0" max="100" placeholder="例如：30">

        <label>目前分數</label>
        <input type="number" id="gradeScore" min="0" max="100" placeholder="例如：75，未考可先留空">

        <button onclick="addGrade()">新增成績</button>
        <p class="small">小提醒：未考的項目可以先不輸入分數，只輸入比例。</p>
      </div>

      <div class="card">
        <h2>成績計算說明</h2>
        <p>系統會依照你輸入的比例與分數，計算目前已取得的加權分數。</p>
        <p>若目標是 60 分及格，系統會估算剩下未完成項目平均需要幾分。</p>
        <div class="notice">
          例如：目前已拿 45 分，剩下比例 30%，那剩餘項目平均需要<br>
          （60 - 45）÷ 0.3 = 50 分。
        </div>
      </div>

      <div class="card full">
        <h2>即將到期與危機警報</h2>
        <div id="alertList"></div>
      </div>

      <div class="card full">
        <h2>課程列表與成績預估</h2>
        <div id="courseTable"></div>
      </div>

      <div class="card full">
        <h2>作業與考試列表</h2>
        <div id="taskTable"></div>
      </div>
    </div>
  </div>

<script>


function getDateAfter(days) {
  const d = new Date();
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

function saveData() {
  localStorage.setItem("courses", JSON.stringify(courses));
  localStorage.setItem("tasks", JSON.stringify(tasks));
  localStorage.setItem("grades", JSON.stringify(grades));
}

function addCourse() {
  const name = document.getElementById("courseName").value.trim();
  const teacher = document.getElementById("teacherName").value.trim();
  const credit = Number(document.getElementById("courseCredit").value);

  if (!name) {
    alert("請輸入課程名稱");
    return;
  }

  courses.push({
    id: Date.now(),
    name,
    teacher: teacher || "未填寫",
    credit: credit || 0
  });

  document.getElementById("courseName").value = "";
  document.getElementById("teacherName").value = "";
  document.getElementById("courseCredit").value = "";

  saveData();
  render();
}

function addTask() {
  const courseId = Number(document.getElementById("taskCourse").value);
  const type = document.getElementById("taskType").value;
  const name = document.getElementById("taskName").value.trim();
  const date = document.getElementById("taskDate").value;

  if (!courseId || !name || !date) {
    alert("請完整輸入事項資料");
    return;
  }

  tasks.push({
    id: Date.now(),
    courseId,
    type,
    name,
    date,
    done: false
  });

  document.getElementById("taskName").value = "";
  document.getElementById("taskDate").value = "";

  saveData();
  render();
}

function addGrade() {
  const courseId = Number(document.getElementById("gradeCourse").value);
  const item = document.getElementById("gradeItem").value.trim();
  const weight = Number(document.getElementById("gradeWeight").value);
  const scoreInput = document.getElementById("gradeScore").value;
  const score = scoreInput === "" ? "" : Number(scoreInput);

  if (!courseId || !item || !weight) {
    alert("請至少輸入課程、項目與比例");
    return;
  }

  if (weight < 0 || weight > 100) {
    alert("比例請輸入 0 到 100 之間");
    return;
  }

  if (score !== "" && (score < 0 || score > 100)) {
    alert("分數請輸入 0 到 100 之間");
    return;
  }

  grades.push({
    id: Date.now(),
    courseId,
    item,
    weight,
    score
  });

  document.getElementById("gradeItem").value = "";
  document.getElementById("gradeWeight").value = "";
  document.getElementById("gradeScore").value = "";

  saveData();
  render();
}

function deleteCourse(id) {
  if (!confirm("刪除課程會一起刪掉相關作業與成績，確定嗎？")) return;

  courses = courses.filter(c => c.id !== id);
  tasks = tasks.filter(t => t.courseId !== id);
  grades = grades.filter(g => g.courseId !== id);

  saveData();
  render();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveData();
  render();
}

function deleteGrade(id) {
  grades = grades.filter(g => g.id !== id);
  saveData();
  render();
}

function toggleTask(id) {
  const task = tasks.find(t => t.id === id);
  if (task) task.done = !task.done;
  saveData();
  render();
}

function getCourseName(id) {
  const course = courses.find(c => c.id === id);
  return course ? course.name : "未知課程";
}

function daysLeft(dateString) {
  const today = new Date();
  today.setHours(0,0,0,0);
  const target = new Date(dateString);
  target.setHours(0,0,0,0);
  return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
}

function taskStatus(task) {
  if (task.done) {
    return { text: "已完成", className: "tag-safe", level: 0 };
  }

  const d = daysLeft(task.date);

  if (d < 0) return { text: `已逾期 ${Math.abs(d)} 天`, className: "tag-danger", level: 4 };
  if (d === 0) return { text: "今天截止", className: "tag-danger", level: 4 };
  if (d <= 2) return { text: `剩 ${d} 天`, className: "tag-danger", level: 3 };
  if (d <= 7) return { text: `剩 ${d} 天`, className: "tag-warning", level: 2 };
  return { text: `剩 ${d} 天`, className: "tag-info", level: 1 };
}

function gradeSummary(courseId) {
  const list = grades.filter(g => g.courseId === courseId);

  let earned = 0;
  let completedWeight = 0;
  let totalWeight = 0;

  list.forEach(g => {
    totalWeight += Number(g.weight);
    if (g.score !== "" && !isNaN(Number(g.score))) {
      earned += Number(g.score) * Number(g.weight) / 100;
      completedWeight += Number(g.weight);
    }
  });

  const remainingWeight = Math.max(0, totalWeight - completedWeight);
  let needed = null;

  if (remainingWeight > 0) {
    needed = (60 - earned) / (remainingWeight / 100);
  }

  let statusText = "尚未輸入";
  let statusClass = "tag-gray";
  let danger = false;

  const estimatedIfRemainingZero = earned;

  if (list.length > 0) {
    if (earned >= 60) {
      statusText = "目前已及格";
      statusClass = "tag-safe";
    } else if (needed !== null && needed <= 60) {
      statusText = "安全";
      statusClass = "tag-safe";
    } else if (needed !== null && needed <= 90) {
      statusText = "注意";
      statusClass = "tag-warning";
    } else if (needed !== null && needed > 90) {
      statusText = "學分危機";
      statusClass = "tag-danger";
      danger = true;
    } else if (estimatedIfRemainingZero < 60) {
      statusText = "危險";
      statusClass = "tag-danger";
      danger = true;
    }
  }

  return {
    earned: earned.toFixed(1),
    completedWeight,
    totalWeight,
    remainingWeight,
    needed,
    statusText,
    statusClass,
    danger,
    items: list
  };
}

function renderSelects() {
  const taskCourse = document.getElementById("taskCourse");
  const gradeCourse = document.getElementById("gradeCourse");

  taskCourse.innerHTML = "";
  gradeCourse.innerHTML = "";

  courses.forEach(c => {
    taskCourse.innerHTML += `<option value="${c.id}">${c.name}</option>`;
    gradeCourse.innerHTML += `<option value="${c.id}">${c.name}</option>`;
  });
}

function renderDashboard() {
  document.getElementById("courseCount").innerText = courses.length;

  const unfinished = tasks.filter(t => !t.done).length;
  document.getElementById("unfinishedCount").innerText = unfinished;

  const urgent = tasks.filter(t => {
    const s = taskStatus(t);
    return !t.done && s.level >= 4;
  }).length;
  document.getElementById("urgentCount").innerText = urgent;

  const dangerCourses = courses.filter(c => gradeSummary(c.id).danger).length;
  document.getElementById("dangerCourseCount").innerText = dangerCourses;
}

function renderAlerts() {
  const alertList = document.getElementById("alertList");

  const sorted = [...tasks]
    .filter(t => !t.done)
    .sort((a, b) => daysLeft(a.date) - daysLeft(b.date));

  if (sorted.length === 0) {
    alertList.innerHTML = `<p class="empty">目前沒有未完成事項。</p>`;
    return;
  }

  let html = `<table>
    <tr>
      <th>狀態</th>
      <th>課程</th>
      <th>類型</th>
      <th>事項</th>
      <th>日期</th>
    </tr>`;

  sorted.slice(0, 8).forEach(t => {
    const s = taskStatus(t);
    html += `
      <tr>
        <td><span class="tag ${s.className}">${s.text}</span></td>
        <td>${getCourseName(t.courseId)}</td>
        <td>${t.type}</td>
        <td>${t.name}</td>
        <td>${t.date}</td>
      </tr>`;
  });

  html += `</table>`;
  alertList.innerHTML = html;
}

function renderCourses() {
  const courseTable = document.getElementById("courseTable");

  if (courses.length === 0) {
    courseTable.innerHTML = `<p class="empty">尚未新增課程。</p>`;
    return;
  }

  let html = `<table>
    <tr>
      <th>課程</th>
      <th>老師</th>
      <th>學分</th>
      <th>目前已拿分數</th>
      <th>完成比例</th>
      <th>及格所需剩餘平均</th>
      <th>狀態</th>
      <th>操作</th>
    </tr>`;

  courses.forEach(c => {
    const g = gradeSummary(c.id);
    const progress = g.totalWeight > 0 ? Math.min(100, g.completedWeight / g.totalWeight * 100) : 0;
    const neededText = g.needed === null
      ? "無剩餘項目"
      : (g.needed <= 0 ? "已達及格" : `${g.needed.toFixed(1)} 分`);

    html += `
      <tr>
        <td><strong>${c.name}</strong></td>
        <td>${c.teacher}</td>
        <td>${c.credit}</td>
        <td>${g.earned}</td>
        <td>
          ${g.completedWeight}% / ${g.totalWeight}%
          <div class="progress"><div class="bar" style="width:${progress}%"></div></div>
        </td>
        <td>${neededText}</td>
        <td><span class="tag ${g.statusClass}">${g.statusText}</span></td>
        <td><button class="danger-btn" onclick="deleteCourse(${c.id})">刪除</button></td>
      </tr>`;

    if (g.items.length > 0) {
      html += `
        <tr>
          <td colspan="8">
            <strong>${c.name} 成績項目：</strong>
            ${g.items.map(item => `
              <span class="tag tag-gray">
                ${item.item}｜${item.weight}%｜${item.score === "" ? "未考" : item.score + "分"}
              </span>
              <button class="secondary" onclick="deleteGrade(${item.id})">刪除</button>
            `).join(" ")}
          </td>
        </tr>`;
    }
  });

  html += `</table>`;
  courseTable.innerHTML = html;
}

function renderTasks() {
  const taskTable = document.getElementById("taskTable");

  if (tasks.length === 0) {
    taskTable.innerHTML = `<p class="empty">尚未新增作業或考試。</p>`;
    return;
  }

  let html = `<table>
    <tr>
      <th>狀態</th>
      <th>課程</th>
      <th>類型</th>
      <th>事項</th>
      <th>日期</th>
      <th>完成</th>
      <th>操作</th>
    </tr>`;

  [...tasks].sort((a, b) => new Date(a.date) - new Date(b.date)).forEach(t => {
    const s = taskStatus(t);

    html += `
      <tr>
        <td><span class="tag ${s.className}">${s.text}</span></td>
        <td>${getCourseName(t.courseId)}</td>
        <td>${t.type}</td>
        <td>${t.name}</td>
        <td>${t.date}</td>
        <td><button onclick="toggleTask(${t.id})">${t.done ? "改未完成" : "標記完成"}</button></td>
        <td><button class="danger-btn" onclick="deleteTask(${t.id})">刪除</button></td>
      </tr>`;
  });

  html += `</table>`;
  taskTable.innerHTML = html;
}

function render() {
  renderSelects();
  renderDashboard();
  renderAlerts();
  renderCourses();
  renderTasks();
}

render();
</script>
</body>
</html>
